  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags – manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin – blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec – re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>DRIP Network – Dashboard<\u002Ftitle>\n<style>:root{\n  --bg:#0c0a07; --ink:#f4ecdd; --muted:#c2ab86; --line:rgba(230,196,132,0.22);\n  --panel:rgba(28,22,14,0.86); --gold:#e0a23c;\n}\nhtml,body{ margin:0; height:100%; background:var(--bg); overflow:hidden;\n  font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }\n#graph{ width:100vw; height:100vh; }\n\n/* ---- tab bar ---- */\n#tabs{ position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:30;\n  display:flex; gap:4px; background:var(--panel); border:1px solid var(--line);\n  border-radius:999px; padding:5px; backdrop-filter:blur(8px); box-shadow:0 8px 24px rgba(0,0,0,0.45); }\n#tabs a{ text-decoration:none; color:var(--muted); font-size:12.5px; font-weight:600;\n  padding:6px 15px; border-radius:999px; transition:.15s; white-space:nowrap; }\n#tabs a:hover{ color:var(--ink); }\n#tabs a.active{ background:rgba(224,162,60,0.22); color:var(--ink); }\n\n/* ---- panel ---- */\n#panel{ position:fixed; top:14px; left:14px; z-index:20; width:288px;\n  background:var(--panel); color:var(--ink); border:1px solid var(--line);\n  border-radius:14px; padding:14px 15px; backdrop-filter:blur(8px);\n  box-shadow:0 8px 30px rgba(0,0,0,0.5); max-height:calc(100vh - 28px); overflow-y:auto; }\n#panel::-webkit-scrollbar{ width:8px; }\n#panel::-webkit-scrollbar-thumb{ background:rgba(224,162,60,0.25); border-radius:8px; }\n#panel .kicker{ font-size:10px; text-transform:uppercase; letter-spacing:1.4px; color:var(--gold); font-weight:700; margin-bottom:6px; }\n#panel h1{ font-size:16px; margin:0 0 6px; letter-spacing:.2px; }\n#panel .blurb{ font-size:11.5px; line-height:1.5; margin:0 0 11px; color:var(--muted); }\n\n/* ---- search ---- */\n.search{ position:relative; margin-bottom:10px; }\n.search input{ width:100%; box-sizing:border-box; background:rgba(255,255,255,0.05);\n  border:1px solid var(--line); border-radius:9px; color:var(--ink);\n  font-size:12.5px; padding:8px 11px; outline:none; }\n.search input::placeholder{ color:#9b865f; }\n.search input:focus{ border-color:rgba(224,162,60,0.55); }\n#searchResults{ display:none; position:absolute; left:0; right:0; top:calc(100% + 4px); z-index:5;\n  background:rgba(24,18,11,0.97); border:1px solid var(--line); border-radius:9px; overflow:hidden;\n  box-shadow:0 10px 28px rgba(0,0,0,0.55); }\n#searchResults .sr{ display:flex; align-items:center; gap:8px; font-size:12px; padding:7px 11px; cursor:pointer; }\n#searchResults .sr:hover{ background:rgba(224,162,60,0.16); }\n\n/* ---- validation row ---- */\n.valrow{ display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted);\n  background:rgba(255,255,255,0.04); border:1px solid var(--line); border-radius:9px; padding:7px 10px; margin-bottom:9px; }\n.valrow .valdot{ width:11px; height:11px; border-radius:50%; background:#fff; flex:none;\n  box-shadow:0 0 9px rgba(255,255,255,0.85); }\n.valrow b{ color:var(--ink); font-weight:700; }\n\n/* ---- buttons ---- */\n.btns{ display:flex; gap:7px; flex-wrap:wrap; margin-top:10px; }\n.btns.tight{ margin-top:0; margin-bottom:4px; }\nbutton{ background:rgba(224,162,60,0.13); color:var(--ink); border:1px solid rgba(224,162,60,0.34);\n  border-radius:8px; padding:6px 10px; font-size:11.5px; cursor:pointer; transition:.15s; }\nbutton:hover{ background:rgba(224,162,60,0.28); }\nbutton.on{ background:rgba(224,162,60,0.42); border-color:var(--gold); color:#fff; }\n\n/* ---- accordions ---- */\n.acc{ border-top:1px solid var(--line); margin-top:11px; padding-top:9px; }\n.acc-h{ display:flex; align-items:center; justify-content:space-between; cursor:pointer;\n  font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:#b79a6d; font-weight:600; }\n.acc-h .caret{ color:#8d764e; font-size:10px; }\n.acc-b{ display:none; padding-top:9px; }\n.acc[data-open=\"1\"] .acc-b{ display:block; }\n.acc .hint{ font-size:10.5px; color:#9b865f; line-height:1.45; margin:0 0 8px; }\n\n/* ---- layer chips ---- */\n.chips{ display:flex; flex-wrap:wrap; gap:5px; }\n.chip{ font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px;\n  border:1.4px solid currentColor; background:transparent; cursor:pointer; transition:.15s; opacity:.92; }\n.chip:hover{ background:rgba(255,255,255,0.06); opacity:1; }\n.chip.on{ background:var(--chipc); color:#1a1206; border-color:var(--chipc);\n  box-shadow:0 0 12px -2px var(--chipc); }\n\n/* ---- legend ---- */\n.legend{ display:flex; flex-direction:column; gap:5px; font-size:11px; color:var(--muted); }\n.legend div{ display:flex; align-items:center; gap:8px; }\n.dot{ width:11px; height:11px; border-radius:50%; box-shadow:0 0 7px currentColor; flex:none; }\n\n/* ---- tree ---- */\n.tree{ display:flex; flex-direction:column; gap:1px; font-size:11.5px; }\n.trow{ display:flex; align-items:center; gap:6px; padding:2px 4px; border-radius:5px; cursor:pointer; }\n.trow:hover{ background:rgba(255,255,255,0.05); }\n.trow.off .tlabel{ opacity:.35; text-decoration:line-through; }\n.caret{ width:11px; text-align:center; color:#b79a6d; font-size:9px; user-select:none; flex:none; }\n.caret.empty{ visibility:hidden; }\n.tdot{ width:9px; height:9px; border-radius:50%; box-shadow:0 0 6px currentColor; flex:none; }\n.tdot.wdot{ box-shadow:0 0 7px rgba(255,255,255,0.8); }\n.tlabel{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }\n\n/* ---- popup ---- */\n#popup{ position:fixed; z-index:25; display:none; max-width:282px;\n  background:rgba(28,22,13,0.96); color:var(--ink);\n  border:1px solid var(--accent,rgba(230,196,132,0.4)); border-radius:12px; padding:13px 15px 14px;\n  backdrop-filter:blur(10px); box-shadow:0 10px 34px rgba(0,0,0,0.6),0 0 16px -4px var(--accent,transparent);\n  transform:translate(-50%,calc(-100% - 16px)); }\n#popup .tag{ display:inline-block; font-size:9.5px; text-transform:uppercase; le lor:var(--muted); margin:10px 0 4px; cursor:pointer; }\n.ck input{ accent-color:var(--gold); width:14px; height:14px; }\nbutton.full{ width:100%; margin-top:10px; padding:8px; font-weight:600; }\nbutton.danger{ background:rgba(224,90,60,0.16); border-color:rgba(224,90,60,0.45); }\nbutton.danger:hover{ background:rgba(224,90,60,0.32); }\n.tool{ font-size:10.5px; line-height:1.45; color:#9b865f; margin:9px 0 0; }\n.tool b{ color:var(--ink); }\n.acc.sel{ border-color:rgba(224,162,60,0.45); }\n.counts{ display:flex; gap:12px; font-size:11px; color:var(--muted); margin-bottom:6px; }\n.counts b{ color:var(--ink); font-size:13px; }\n.connrow{ display:flex; align-items:center; gap:8px; font-size:12.5px; margin:2px 0 6px; }\n.connrow .cend{ background:rgba(255,255,255,0.06); border:1px solid var(--line); border-radius:7px; padding:4px 8px; }\n.connrow .carr{ color:var(--gold); font-weight:700; }\n.flash{ position:fixed; bottom:24px; left:50%; transform:translate(-50%,16px); z-index:60;\n  background:rgba(40,32,18,0.96); color:var(--ink); border:1px solid rgba(224,162,60,0.5);\n  border-radius:999px; padding:10px 20px; font-size:12.5px; opacity:0; transition:.3s;\n  box-shadow:0 10px 30px rgba(0,0,0,0.5); }\n.flash.show{ opacity:1; transform:translate(-50%,0); }\n.flash.bad{ border-color:rgba(224,90,60,0.6); }\n\n/* ===== Home button + Send-information route ===== */\n#homeLink{ position:fixed; right:16px; bottom:16px; z-index:35; text-decoration:none;\n  background:rgba(28,22,14,0.86); color:var(--ink); border:1px solid rgba(224,162,60,0.4);\n  border-radius:999px; padding:9px 16px; font-size:12.5px; font-weight:600; cursor:pointer;\n  backdrop-filter:blur(8px); box-shadow:0 8px 24px rgba(0,0,0,0.45); transition:.15s; }\n#homeLink:hover{ background:rgba(224,162,60,0.28); color:#fff; }\n#shareLink{ position:fixed; right:16px; bottom:58px; z-index:35; text-decoration:none;\n  background:rgba(28,22,14,0.86); color:var(--ink); border:1px solid rgba(224,162,60,0.4);\n  border-rad tter-spacing:3px; font-size:12px; font-weight:700; color:#e0a23c; }\n  #home h1{ text-transform:uppercase; letter-spacing:.5px; font-weight:800;\n    font-size:clamp(30px,4.6vw,46px); line-height:1.12; margin:14px 0 0; max-width:20ch; color:#f4ecdd; }\n  #home .lead{ font-size:15.5px; line-height:1.65; color:#c2ab86; max-width:62ch; margin:34px 0 0; }\n  #home .valnote{ display:inline-flex; align-items:center; gap:10px; margin-top:22px;\n    background:rgba(28,22,14,0.7); border:1px solid rgba(230,196,132,0.2); border-radius:999px; padding:9px 16px;\n    font-size:12.5px; color:#c2ab86; }\n  #home .valnote .d{ width:12px; height:12px; border-radius:50%; background:#fff; box-shadow:0 0 10px rgba(255,255,255,0.85); }\n  #home .valnote b{ color:#f4ecdd; }\n  #home .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; margin-top:40px; }\n  #home .card{ position:relative; display:block; text-align:left; cursor:pointer; overflow:hidden; color:inherit;\n    background:rgba(28,22,14,0.7); border:1px solid rgba(230,196,132,0.2); border-radius:16px; padding:22px;\n    font:inherit; transition:.18s ease; }\n  #home .card:hover{ transform:translateY(-3px); border-color:rgba(224,162,60,0.5); box-shadow:0 16px 40px rgba(0,0,0,0.5); }\n  #home .card .num{ font-size:13px; font-weight:700; color:#e0a23c; letter-spacing:1px; }\n  #home .card h2{ text-transform:uppercase; letter-spacing:.6px; font-size:20px; margin:6px 0 8px; color:#f4ecdd; }\n  #home .card p{ font-size:12.8px; line-height:1.55; color:#c2ab86; margin:0; }\n  #home .card .go{ margin-top:16px; font-size:12.5px; font-weight:700; color:#e0a23c; }\n  #home .card .orb{ position:absolute; right:-26px; top:-26px; width:120px; height:120px; opacity:.5; pointer-events:none; }\n  #home .feat{ margin-top:52px; border-top:1px solid rgba(230,196,132,0.2); padding-top:26px;\n    display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:22px; }\n  #home .feat h3{ text-transform:uppercase; letter-spacing:.8px; font-size:13px; color:#f4ecdd; margin:0 0 7px; }\n  #home .feat p{ font-size:12.3px; line-height:1.55; color:#c2ab86; margin:0; }\n  #home .feat .ic{ color:#e0a23c; font-size:18px; }\n  #home footer{ margin-top:54px; font-size:11.5px; color:#8d764e; }\n  #discLink{ z-index:42; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n<!-- ===== loading screen ===== -->\n<div id=\"cnLoader\">\n  <div class=\"dm\">DRIP<span class=\"cn-dot\">.<\u002Fspan><\u002Fdiv>\n  <div class=\"barwrap\"><div class=\"bar\" id=\"cnBar\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"pct\" id=\"cnPct\">0%<\u002Fdiv>\n<\u002Fdiv>\n<script>\n  (function(){\n    var pct = 0, done = false;\n    function paint(){ var bar=document.getElementById('cnBar'), txt=document.getElementById('cnPct');\n      if(bar) bar.style.width = pct + '%'; if(txt) txt.textContent = Math.round(pct) + '%'; }\n    var iv = setInterval(function(){ if(done) return; if(pct < 90){ pct += Math.max(0.6,(90-pct)*0.04); paint(); } }, 60);\n    function finish(){\n      if(done) return; done = true; clearInterval(iv); pct = 100; paint();\n      var L = document.getElementById('cnLoader');\n      setTimeout(function(){ if(L){ L.classList.add('done'); setTimeout(function(){ if(L) L.style.display='none'; }, 650); } }, 220);\n    }\n    window.__cnLoaderDone = finish;\n    // dismiss when all assets have loaded …\n    window.addEventListener('load', function(){ setTimeout(finish, 500); });\n    // … and a hard safety net so it can never get stuck\n    setTimeout(finish, 9000);\n  })();\n<\u002Fscript>\n\n<div id=\"graph\"><\u002Fdiv>\n<div id=\"home\"><\u002Fdiv>\n\n<a id=\"dripHome\" href=\"DRIP.html\" target=\"_top\" title=\"Back to the DRIP home page\" style=\"position:fixed;left:16px;bottom:16px;z-index:50;text-decoration:none;background:rgba(28,22,14,0.86);color:#f4ecdd;border:1px solid rgba(224,162,60,0.4);border-radius:999px;padding:9px 16px;font-size:12.5px;font-weight:600;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;backdrop-filter:blur(8px);box-shadow:0 8px 24px rgba(0,0,0,0.45)\">&larr; Back to DRIP</a>\n<script src=\"96b44638-676d-4964-864e-5870519d843c\"><\u002Fscript>\n<script src=\"035c3d01-92b9-43b5-99ac-b3ce45f3e851\"><\u002Fscript>\n<script src=\"63723cf9-fb70-489d-9bbe-77a7c86ff975\"><\u002Fscript>\n<script>window.__AUTORUN = false;<\u002Fscript>\n<script src=\"9f86e837-3675-4ebe-a9e3-20f24d3c90d2\"><\u002Fscript>\n<script src=\"fbc88d4e-e2a6-4071-ac67-d83071e5c08e\"><\u002Fscript>\n<script src=\"fa37a36c-c2b2-424a-bd25-891b43373ffa\"><\u002Fscript>\n<script>\n(function () {\n  const D = window.DSLIP;\n  const home = document.getElementById('home');\n  const graphEl = document.getElementById('graph');\n\n  const blurbs = {\n    web:'The whole programme at a glance – core, functions, the two REMs and the eleven child projects.',\n    rem:'The Regional Exchange Mechanism as the bridge between global coordination and country delivery.',\n    project:'A single child project end to end – Malawi shown from ministries down to farmers.',\n    flow:'How knowledge and monitoring data move – plus a packet router that times any journey.',\n    merged:'Everything merged into one network, with shared nodes acting as bridges.',\n    editor:'Add nodes, connect them by clicking, edit connections and validate – then export your work.'\n  };\n  const accent = { web:'#5ba9de', rem:'#36b3a6', project:'#6fb04a', flow:'#edab73', merged:'#b08fe0', editor:'#f2b33d' };\n  function orb(c){ return `<svg class=\"orb\" viewBox=\"0 0 120 120\" fill=\"none\">\n      <circle cx=\"60\" cy=\"60\" r=\"8\" fill=\"${c}\"/><circle cx=\"92\" cy=\"40\" r=\"5\" fill=\"${c}\" opacity=\".7\"/>\n      <circle cx=\"38\" cy=\"90\" r=\"4\" fill=\"${c}\" opacity=\".6\"/><circle cx=\"96\" cy=\"86\" r=\"3.5\" fill=\"#fff\" opacity=\".7\"/>\n      <circle cx=\"30\" cy=\"44\" r=\"3\" fill=\"#fff\" opacity=\".6\"/>\n      <line x1=\"60\" y1=\"60\" x2=\"92\" y2=\"40\" stroke=\"${c}\" stroke-width=\"1\" opacity=\".4\"/>\n      <line x1=\"60\" y1=\"60\" x2=\"38\" y2=\"90\" stroke=\"${c}\" stroke-width=\"1\" opacity=\".4\"/>\n      <line x1=\"60\" y1=\"60\" x2=\"96\" y2=\"86\" stroke=\"${c}\" stroke-width=\"1\" opacity=\".3\"/>\n      <line x1=\"60\" y1=\"60\" x2=\"30\" y2=\"44\" stroke=\"${c}\" stroke-width=\"1\" opacity=\".3\"/><\u002Fsvg>`; }\n\n  const cards = D.TABS.map((t,i) =>\n    `<button class=\"card\" data-view=\"${t.id}\">${orb(accent[t.id]||'#e0a23c')}\n       <div class=\"num\">0${i+1}<\u002Fdiv><h2>${t.label}<\u002Fh2><p>${blurbs[t.id]||''}<\u002Fp>\n       <div class=\"go\">Open view →<\u002Fdiv><\u002Fbutton>`).join('');\n\n  home.innerHTML = `<div class=\"wrap\">\n    <div class=\"kicker\">DSL-IP · Global Coordination Project<\u002Fdiv>\n    <h1>The DRIP Network<\u002Fh1>\n    <p class=\"lead\">An interactive map of the Drylands Sustainable Landscapes Impact Program – its coordination core, support functions, Regional Exchange Mechanisms, the eleven child projects and the institutions, partners and themes that connect them. Five lenses on one system, plus a Builder to add and validate nodes.<\u002Fp>\n    <div class=\"valnote\"><span class=\"d\"><\u002Fspan><span>Nodes shown in <b>white<\u002Fb> are newly added from the documents and are <b>awaiting validation<\u002Fb>.<\u002Fspan><\u002Fdiv>\n    <div class=\"grid\">${cards}<\u002Fdiv>\n    <div class=\"feat\">\n      <div><div class=\"ic\">◴<\u002Fdiv><h3>Thematic layers<\u002Fh3><p>Spotlight a Community of Practice or cross-cutting theme across the whole web.<\u002Fp><\u002Fdiv>\n      <div><div class=\"ic\">⬗<\u002Fdiv><h3>Institutional layers<\u002Fh3><p>Light up one tier of the engagement ladder, Global → Community.<\u002Fp><\u002Fdiv>\n      <div><div class=\"ic\">▷<\u002Fdiv><h3>Send information<\u002Fh3><p>In the flow view, route a packet between two nodes and time its journey.<\u002Fp><\u002Fdiv>\n      <div><div class=\"ic\">⛓<\u002Fdiv><h3>Builder<\u002Fh3><p>Add nodes, connect them by clicking, edit connections and export your work.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <footer>Part of DRIP, a project of the DSL-IP · FAO / GEF – funded by the GEF, the first engine of the DFSA (Dryland Forest Support Accelerator). Actively overseen by a UN Officer; related to the Programme’s behaviour-change research. Standalone, offline-ready. Pending institutional sign-off.<\u002Ffooter>\n  <\u002Fdiv>`;\n\n  function showHome() {\n    window.__viewGen = (window.__viewGen || 0) + 1; // stop any running view loop\n    ['tabs','panel','popup','homeLink','shareLink'].forEach(id => { const e = document.getElementById(id); if (e) e.remove(); });\n    graphEl.innerHTML = ''; graphEl.style.display = 'none';\n    home.style.display = 'block';\n    try { history.replaceState(null, '', location.pathname + location.search + '#home'); } catch(e){ location.hash = 'home'; }\n  }\n  function go(viewId) {\n    home.style.display = 'none'; graphEl.style.display = 'block';\n    window.VIEW_ID = viewId;\n    if (viewId === 'editor') window.__buildEditor(); else window.__buildConstellation();\n    try { history.replaceState(null, '', location.pathname + location.search + '#' + viewId); } catch(e){ location.hash = viewId; }\n  }\n\n  home.addEventListener('click', e => { const c = e.target.closest('.card'); if (c) go(c.dataset.view); });\n  document.addEventListener('click', e => {\n    if (e.target.closest('#homeLink')) { e.preventDefault(); showHome(); return; }\n    const a = e.target.closest('#tabs a'); if (!a) return;\n    e.preventDefault();\n    const tab = D.TABS.find(t => t.file === a.getAttribute('href'));\n    if (tab) go(tab.id);\n  });\n\n  // deep-link: open the view named in the URL hash (#flow, #editor, …), else the Programme view\n  const startId = (location.hash || '').replace(/^#/, '');\n  const startTab = D.TABS.find(t => t.id === startId);\n  go(startTab ? startTab.id : 'web');\n  // dismiss the loading screen once the first view is built\n  setTimeout(function(){ if (window.__cnLoaderDone) window.__cnLoaderDone(); }, 600);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
